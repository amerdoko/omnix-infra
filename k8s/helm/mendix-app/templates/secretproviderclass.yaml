apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: mendix-kv
  namespace: mendix
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.workloadIdentity.clientId | quote }}
    keyvaultName: {{ .Values.keyVault.name | quote }}
    cloudName: AzurePublicCloud
    objects: |
      array:
{{- range .Values.keyVault.secrets }}
        - |
          objectName: {{ . }}
          objectType: secret
{{- end }}
    tenantId: {{ .Values.workloadIdentity.tenantId | quote }}
  secretObjects:
{{- range .Values.keyVault.secrets }}
    - secretName: {{ . | lower }}
      type: Opaque
      data:
        - objectName: {{ . }}
          key: value
{{- end }}
