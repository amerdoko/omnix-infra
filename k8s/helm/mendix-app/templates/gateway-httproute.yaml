{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: mendix-gw
  namespace: mendix
  annotations:
    alb.networking.azure.io/alb-namespace: alb-system
    alb.networking.azure.io/alb-name: mendix-alb
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mendix-route
  namespace: mendix
spec:
  parentRefs:
    - name: mendix-gw
  hostnames: {{- if .Values.gateway.hostname }}
    - {{ .Values.gateway.hostname | quote }}
{{- else }} []
{{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: mendix-app
          port: 80
{{- end }}
